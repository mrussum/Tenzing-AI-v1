databases:
  - name: tenzing-ai-db
    plan: free   # NOTE: free tier expires after 90 days — upgrade before expiry to keep data

services:
  - type: web
    name: tenzing-ai-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt && alembic upgrade head
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.0"
      - key: ANTHROPIC_API_KEY
        sync: false          # marks it as a secret — Render will prompt you to paste the value
      - key: JWT_SECRET_KEY
        sync: false          # generate with: python3 -c "import secrets; print(secrets.token_hex(32))"
      - key: ALLOWED_ORIGINS
        value: ""            # set to your frontend URL, e.g. https://tenzing-ai.onrender.com
      - key: DATABASE_URL
        fromDatabase:
          name: tenzing-ai-db
          property: connectionString
